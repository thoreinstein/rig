syntax = "proto3";

package rig.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "thoreinstein.com/rig/pkg/api/v1;apiv1";

// SecretService is implemented by the host to provide sandboxed access to secrets.
service SecretService {
  // GetSecret retrieves a secret value by key from the host's configuration/keychain.
  // Returns:
  //   - NOT_FOUND: Key doesn't exist
  //   - UNAUTHENTICATED: Missing plugin identity
  //   - INVALID_ARGUMENT: Malformed key
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);

  // GetSecrets retrieves multiple secret values by key in a single request.
  // Returns:
  //   - UNAUTHENTICATED: Missing plugin identity
  // Partial failures return available secrets with missing keys omitted from the map.
  rpc GetSecrets(GetSecretsRequest) returns (GetSecretsResponse);

  // RefreshToken is deprecated and no-op. Session tokens are no longer used.
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option deprecated = true;
  }
}

message SecretValue {
  string value = 1;
  google.protobuf.Duration ttl = 2;
  google.protobuf.Timestamp last_updated = 3;
}

message GetSecretRequest {
  string key = 1;
  string token = 2 [deprecated = true]; // Deprecated: token-based auth is replaced by connection-bound identity.
}

message GetSecretResponse {
  string value = 1 [deprecated = true];
  SecretValue secret = 2;
}

message GetSecretsRequest {
  repeated string keys = 1;
  string token = 2 [deprecated = true]; // Deprecated: token-based auth is replaced by connection-bound identity.
}


message GetSecretsResponse {
  map<string, SecretValue> secrets = 1;
}

message RefreshTokenRequest {
  string current_token = 1;
}

message RefreshTokenResponse {
  string new_token = 1;
  // expires_at is reserved for future use; currently not populated by the host.
  google.protobuf.Timestamp expires_at = 2;
}
